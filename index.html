<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>拯救方塊世界</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #20313a;
        --muted: #61717c;
        --paper: #fffdf5;
        --panel: #ffffff;
        --line: #d9e3e7;
        --soil: #94704d;
        --grass: #66a95c;
        --water: #5aa6cf;
        --sun: #f0b84f;
        --leaf: #3f8f5c;
        --clay: #d66b55;
        --stone: #778795;
        --sky: #bde8f7;
        --shadow: 0 18px 42px rgba(29, 48, 58, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(205, 236, 247, 0.96), rgba(255, 247, 218, 0.96)),
          repeating-linear-gradient(45deg, rgba(32, 49, 58, 0.035) 0 18px, transparent 18px 36px);
      }

      button {
        font: inherit;
      }

      .wrap {
        width: min(1220px, calc(100vw - 28px));
        margin: 0 auto;
        padding: 22px 0;
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      .kicker {
        margin: 0 0 6px;
        color: #2f6f9d;
        font-size: 0.88rem;
        font-weight: 900;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 0;
        font-size: clamp(2.1rem, 5vw, 3.5rem);
        line-height: 1.05;
      }

      .hud {
        display: grid;
        grid-template-columns: repeat(4, minmax(74px, 1fr));
        gap: 9px;
      }

      .hud-card {
        min-height: 72px;
        padding: 10px;
        border: 2px solid rgba(32, 49, 58, 0.09);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.8);
        text-align: center;
      }

      .hud-card strong {
        display: block;
        font-size: 1.5rem;
        line-height: 1.05;
      }

      .hud-card span {
        color: var(--muted);
        font-weight: 900;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(340px, 1.08fr) minmax(360px, 0.92fr);
        gap: 16px;
        align-items: start;
      }

      .island,
      .console {
        border: 2px solid rgba(32, 49, 58, 0.08);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .island {
        position: relative;
        min-height: 680px;
        padding: 22px;
        background:
          linear-gradient(180deg, var(--sky) 0 31%, #7fca6e 31% 100%);
      }

      .island::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.28) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.22) 1px, transparent 1px);
        background-size: 42px 42px;
        opacity: 0.32;
        pointer-events: none;
      }

      .cloud {
        position: absolute;
        width: 126px;
        height: 40px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
      }

      .cloud::before,
      .cloud::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        background: inherit;
      }

      .cloud::before {
        width: 52px;
        height: 52px;
        top: -20px;
        left: 18px;
      }

      .cloud::after {
        width: 62px;
        height: 62px;
        top: -30px;
        right: 18px;
      }

      .cloud.one {
        left: 8%;
        top: 46px;
      }

      .cloud.two {
        right: 9%;
        top: 82px;
        transform: scale(0.78);
      }

      .block-map {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        gap: 6px;
        margin-top: 130px;
        padding: 12px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.32);
      }

      .tile {
        aspect-ratio: 1;
        border: 0;
        border-radius: 5px;
        background: var(--grass);
        box-shadow:
          inset 0 5px rgba(255, 255, 255, 0.2),
          inset 0 -8px rgba(0, 0, 0, 0.1);
      }

      .tile.water {
        background: var(--water);
      }

      .tile.soil {
        background: var(--soil);
      }

      .tile.path {
        background: #d6b36c;
      }

      .tile.zone {
        position: relative;
        display: grid;
        place-items: center;
        color: #fff;
        cursor: pointer;
        font-weight: 900;
        outline: 3px solid rgba(255, 255, 255, 0.76);
        outline-offset: -5px;
        transition: filter 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      }

      .tile.zone:hover,
      .tile.zone:focus-visible {
        transform: translateY(-2px);
        outline-color: #fff4a8;
      }

      .zone-icon {
        display: grid;
        place-items: center;
        width: min(68%, 58px);
        aspect-ratio: 1;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.22);
        box-shadow: inset 0 -8px rgba(0, 0, 0, 0.12);
        font-size: clamp(0.85rem, 2vw, 1.25rem);
      }

      .tile.zone.is-lit {
        filter: saturate(1.22) brightness(1.1);
        box-shadow:
          0 0 0 3px rgba(255, 244, 168, 0.78),
          0 0 22px rgba(255, 226, 105, 0.85),
          inset 0 5px rgba(255, 255, 255, 0.3),
          inset 0 -8px rgba(0, 0, 0, 0.09);
      }

      .tile.zone.is-complete {
        filter: saturate(1.35) brightness(1.18);
        box-shadow:
          0 0 0 4px #fff4a8,
          0 0 32px rgba(255, 226, 105, 0.96),
          inset 0 7px rgba(255, 255, 255, 0.34),
          inset 0 -8px rgba(0, 0, 0, 0.08);
      }

      .zone-progress {
        position: absolute;
        left: 7px;
        right: 7px;
        bottom: 7px;
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.28);
        overflow: hidden;
      }

      .zone-progress i {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: #fff4a8;
      }

      .zone-done {
        position: absolute;
        right: 7px;
        top: 6px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #fff;
        color: #34724c;
        font-size: 0.72rem;
        line-height: 18px;
      }

      .inventory {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 9px;
        margin-top: 16px;
      }

      .slot {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 52px;
        padding: 8px;
        border: 2px solid rgba(32, 49, 58, 0.1);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        font-weight: 900;
      }

      .sample-block {
        width: 34px;
        height: 34px;
        border-radius: 5px;
        box-shadow: inset 0 6px rgba(255, 255, 255, 0.24), inset 0 -7px rgba(0, 0, 0, 0.12);
      }

      .wood {
        background: #b8834e;
      }

      .stone {
        background: var(--stone);
      }

      .leaf {
        background: var(--leaf);
      }

      .crystal {
        background: #5f85d7;
      }

      .legend {
        position: relative;
        z-index: 1;
        margin: 14px 0 0;
        padding: 12px 14px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        color: var(--muted);
        font-weight: 800;
        line-height: 1.5;
      }

      .core-panel {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 12px;
        align-items: center;
        margin-top: 14px;
        padding: 12px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.85);
        border: 2px solid rgba(32, 49, 58, 0.08);
      }

      .core-orb {
        display: grid;
        place-items: center;
        width: 58px;
        height: 58px;
        border-radius: 8px;
        color: #705015;
        background: #d9dde2;
        box-shadow: inset 0 8px rgba(255, 255, 255, 0.28), inset 0 -10px rgba(0, 0, 0, 0.12);
        font-size: 1.6rem;
        font-weight: 900;
        transition: background 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      }

      .core-orb.lit {
        background: #f3c45e;
        box-shadow:
          0 0 22px rgba(255, 222, 92, 0.9),
          inset 0 8px rgba(255, 255, 255, 0.32),
          inset 0 -10px rgba(0, 0, 0, 0.1);
      }

      .core-panel strong {
        display: block;
        margin-bottom: 6px;
      }

      .core-meter {
        height: 12px;
        border-radius: 999px;
        background: #e4edf1;
        overflow: hidden;
      }

      .core-meter i {
        display: block;
        width: 0;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #66a95c, #f0b84f);
        transition: width 220ms ease;
      }

      .rescue-log {
        position: relative;
        z-index: 1;
        margin-top: 10px;
        padding: 12px 14px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.85);
        border: 2px solid rgba(32, 49, 58, 0.08);
      }

      .rescue-log strong {
        display: block;
        margin-bottom: 8px;
      }

      .rescue-log ul {
        display: grid;
        gap: 6px;
        margin: 0;
        padding-left: 1.15rem;
        color: var(--muted);
        font-weight: 800;
        line-height: 1.4;
      }

      .console {
        min-height: 680px;
        background: rgba(255, 255, 255, 0.96);
      }

      .screen {
        display: none;
        min-height: 680px;
        padding: 26px;
      }

      .screen.active {
        display: flex;
        flex-direction: column;
      }

      .intro {
        justify-content: center;
      }

      .intro p,
      .done p {
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.7;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 18px;
      }

      .chip {
        padding: 7px 10px;
        border-radius: 999px;
        background: #eef6f1;
        color: #326f48;
        font-weight: 900;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .primary,
      .secondary,
      .icon {
        min-height: 46px;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 900;
      }

      .primary {
        padding: 0 18px;
        color: #fff;
        background: #3f8f5c;
      }

      .secondary {
        padding: 0 18px;
        color: var(--ink);
        background: #edf3f5;
      }

      .icon {
        display: grid;
        place-items: center;
        width: 46px;
        min-width: 46px;
        color: var(--ink);
        background: #edf3f5;
        font-size: 1.35rem;
      }

      .task-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .task-head > div {
        flex: 1;
        min-width: 0;
      }

      .task-head h2 {
        margin-bottom: 0;
        font-size: 1.65rem;
      }

      .bar-row {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
        color: var(--muted);
        font-weight: 900;
      }

      .bar {
        height: 12px;
        border-radius: 999px;
        background: #e5edf1;
        overflow: hidden;
      }

      .bar i {
        display: block;
        width: 0;
        height: 100%;
        border-radius: inherit;
        background: var(--sun);
        transition: width 180ms ease;
      }

      .mission {
        min-height: 132px;
        padding: 18px;
        border: 2px dashed #bfd2db;
        border-radius: 8px;
        background: #f8fbfc;
      }

      .mission-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(44px, 1fr));
        gap: 8px;
      }

      .mini-block {
        display: grid;
        place-items: center;
        min-height: 48px;
        border-radius: 6px;
        color: #fff;
        font-weight: 900;
        box-shadow: inset 0 6px rgba(255, 255, 255, 0.23), inset 0 -8px rgba(0, 0, 0, 0.13);
      }

      .mini-block.dim {
        opacity: 0.28;
      }

      .question {
        min-height: 88px;
        margin: 16px 0 12px;
        font-size: 1.32rem;
        font-weight: 900;
        line-height: 1.55;
      }

      .step-boxes {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 12px;
      }

      .step {
        min-height: 72px;
        padding: 10px;
        border: 2px solid #d8e3e7;
        border-radius: 8px;
        background: #fff;
      }

      .step strong {
        display: block;
        margin-bottom: 5px;
        color: #2f6f9d;
      }

      .answers {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .answer {
        min-height: 62px;
        padding: 10px;
        border: 2px solid #d8e3e7;
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        font-size: 1.08rem;
        font-weight: 900;
      }

      .answer:hover,
      .answer:focus-visible {
        border-color: #3a82b5;
        outline: 0;
      }

      .answer.good {
        border-color: #3f8f5c;
        background: #eaf6ed;
      }

      .answer.bad {
        border-color: var(--clay);
        background: #fff0ee;
      }

      .feedback {
        min-height: 58px;
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 8px;
        background: #f0f6f8;
        color: var(--muted);
        font-weight: 850;
        line-height: 1.5;
      }

      .feedback.good {
        background: #eaf6ed;
        color: #316a46;
      }

      .feedback.try {
        background: #fff3e4;
        color: #85531f;
      }

      .done {
        justify-content: center;
      }

      .medal {
        display: grid;
        place-items: center;
        width: 86px;
        height: 86px;
        margin-bottom: 18px;
        border-radius: 8px;
        background: var(--sun);
        color: #6e4910;
        box-shadow: inset 0 10px rgba(255, 255, 255, 0.25), inset 0 -12px rgba(0, 0, 0, 0.1);
        font-size: 2.5rem;
        font-weight: 900;
      }

      @media (max-width: 940px) {
        .wrap {
          width: min(100vw - 18px, 680px);
          padding: 12px 0;
        }

        .top {
          align-items: flex-start;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .island,
        .console,
        .screen {
          min-height: auto;
        }

        .island {
          padding: 14px;
        }

        .block-map {
          margin-top: 112px;
          gap: 4px;
          padding: 8px;
        }

        .inventory {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .screen {
          padding: 20px;
        }
      }

      @media (max-width: 560px) {
        .top {
          flex-direction: column;
        }

        .hud {
          width: 100%;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .block-map {
          grid-template-columns: repeat(5, 1fr);
        }

        .tile.hide-mobile {
          display: none;
        }

        .answers,
        .step-boxes {
          grid-template-columns: 1fr;
        }

        .question {
          font-size: 1.14rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <div>
          <p class="kicker">康軒二下數學期末複習｜第 6-10 單元</p>
          <h1>拯救方塊世界</h1>
        </div>
        <div class="hud" aria-label="遊戲狀態">
          <div class="hud-card"><strong id="starCount">0</strong><span>能量星</span></div>
          <div class="hud-card"><strong id="buildCount">0/5</strong><span>救援點</span></div>
          <div class="hud-card"><strong id="materialCount">0</strong><span>材料</span></div>
          <div class="hud-card"><strong id="streakCount">0</strong><span>連擊</span></div>
        </div>
      </header>

      <main class="layout">
        <section class="island" aria-label="方塊世界地圖">
          <span class="cloud one"></span>
          <span class="cloud two"></span>
          <div id="blockMap" class="block-map"></div>
          <div class="inventory" aria-label="材料背包">
            <div class="slot"><span class="sample-block wood"></span><span>木塊 <b id="woodCount">0</b></span></div>
            <div class="slot"><span class="sample-block stone"></span><span>石塊 <b id="stoneCount">0</b></span></div>
            <div class="slot"><span class="sample-block leaf"></span><span>葉塊 <b id="leafCount">0</b></span></div>
            <div class="slot"><span class="sample-block crystal"></span><span>晶塊 <b id="crystalCount">0</b></span></div>
          </div>
          <div class="core-panel" aria-label="世界核心亮度">
            <div id="coreOrb" class="core-orb" aria-hidden="true">芯</div>
            <div>
              <strong id="coreTitle">世界核心：沉睡中</strong>
              <div class="core-meter"><i id="coreMeter"></i></div>
            </div>
          </div>
          <p class="legend">點地圖上的彩色方塊接任務。答對會取得材料，材料會自動點亮橋、塔、倉庫、廚房和花園。</p>
          <div class="rescue-log">
            <strong>救援日誌</strong>
            <ul id="rescueLog"></ul>
          </div>
        </section>

        <section class="console" aria-label="任務面板">
          <div id="introScreen" class="screen intro active">
            <div class="chips">
              <span class="chip">採集</span>
              <span class="chip">建造</span>
              <span class="chip">救援</span>
              <span class="chip">複習</span>
            </div>
            <h2>方塊世界的核心熄滅了</h2>
            <p>你是方塊守護員。完成數學任務可以取得材料，把五個救援點一個一個點亮。連續答對會觸發連擊獎勵，世界核心也會越來越亮。</p>
            <div class="actions">
              <button id="startBtn" class="primary" type="button">開始救援</button>
              <button id="resetBtn" class="secondary" type="button">重新開始</button>
            </div>
          </div>

          <div id="taskScreen" class="screen">
            <div class="task-head">
              <button id="homeBtn" class="icon" type="button" aria-label="回到說明">‹</button>
              <div>
                <p id="unitTopic" class="kicker">任務</p>
                <h2 id="unitTitle"></h2>
              </div>
              <button id="speakBtn" class="icon" type="button" aria-label="朗讀題目">▶</button>
            </div>
            <div class="bar-row">
              <span id="progressText">1/6</span>
              <div class="bar" aria-hidden="true"><i id="progressBar"></i></div>
            </div>
            <div id="mission" class="mission"></div>
            <p id="question" class="question"></p>
            <div id="steps" class="step-boxes"></div>
            <div id="answers" class="answers"></div>
            <div id="feedback" class="feedback" role="status"></div>
            <div class="actions">
              <button id="hintBtn" class="secondary" type="button">提示方塊</button>
              <button id="nextBtn" class="primary" type="button" hidden>下一個任務</button>
            </div>
          </div>

          <div id="doneScreen" class="screen done">
            <div class="medal">完</div>
            <h2>方塊世界被拯救了</h2>
            <p id="doneText"></p>
            <div class="actions">
              <button id="reviewBtn" class="primary" type="button">練習錯題</button>
              <button id="againBtn" class="secondary" type="button">重新挑戰</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const units = [
        {
          id: "workshop",
          title: "材料工坊",
          topic: "第六單元｜兩步驟應用問題",
          color: "#c4834e",
          icon: "工",
          material: "wood",
          intro: "先找第一件事，再算第二件事。",
          questions: [
            task("有 4 堆木塊，每堆 3 塊，又採到 2 塊。共有幾塊木塊？", ["14 塊", "12 塊", "9 塊", "17 塊"], "14 塊", ["先算 4 堆共有 4×3。", "再把新採到的 2 塊加上去。"], "先算 4×3，再加 2。", "wood:4"),
            task("晶石每盒 5 顆，拿了 3 盒，用掉 4 顆後還剩幾顆？", ["11 顆", "15 顆", "9 顆", "19 顆"], "11 顆", ["先算 3 盒共有 15 顆。", "再算 15-4。"], "先乘再減。", "crystal:5"),

      const state = {

      const el = {

      load();

      function task(text, answers, correct, steps, hint, visual) {
        return { text, answers, correct, steps, hint, visual };
      }

      function show(name) {
        el.introScreen.classList.toggle("active", name === "intro");
        el.taskScreen.classList.toggle("active", name === "task");
        el.doneScreen.classList.toggle("active", name === "done");
        if (name === "task" && window.matchMedia("(max-width: 940px)").matches) {
          requestAnimationFrame(() => el.taskScreen.scrollIntoView({ block: "start", behavior: "smooth" }));
        }
      }

      function drawMap() {
        const layout = [
          "wwwwwwwwww",
          "wggggggggw",
          "wgZgppgZgw",
          "wgggppgggw",
          "wpppZpppgw",
          "wgggppgggw",
          "wgZgppgZgw",
          "wggggggggw",
          "wssggggssw",
          "wwwwwwwwww"
        ];
        const zones = [
          { pos: 22, unit: "workshop" },
          { pos: 27, unit: "bridge" },
          { pos: 44, unit: "warehouse" },
          { pos: 62, unit: "kitchen" },
          { pos: 67, unit: "garden" }
        ];
        const zoneByPos = Object.fromEntries(zones.map((item) => [item.pos, item.unit]));
        el.blockMap.innerHTML = "";
        layout.join("").split("").forEach((char, index) => {
          const unitId = zoneByPos[index];
          const unit = units.find((item) => item.id === unitId);
          const tile = document.createElement(unit ? "button" : "span");
          tile.className = "tile";
          if (char === "w") tile.classList.add("water");
          if (char === "s") tile.classList.add("soil");
          if (char === "p") tile.classList.add("path");
          if (index > 74) tile.classList.add("hide-mobile");
          if (unit) {
            const progress = state.progress[unit.id] || 0;
            const percent = Math.round((progress / unit.questions.length) * 100);
            const done = progress >= unit.questions.length;
            tile.type = "button";
            tile.classList.add("zone");
            if (progress > 0) tile.classList.add("is-lit");
            if (done) tile.classList.add("is-complete");
            tile.style.background = unit.color;
            tile.setAttribute("aria-label", unit.title);
            tile.innerHTML = `<span class="zone-icon">${unit.icon}</span><span class="zone-progress"><i style="width:${percent}%"></i></span>${done ? '<span class="zone-done">✓</span>' : ""}`;
            tile.addEventListener("click", () => startUnit(unit.id));
          }
          el.blockMap.appendChild(tile);
        });
      }

      function renderHud() {
        const complete = units.filter((unit) => (state.progress[unit.id] || 0) >= unit.questions.length).length;
        const totalMaterials = Object.values(state.materials).reduce((sum, value) => sum + value, 0);
        const totalProgress = units.reduce((sum, unit) => sum + (state.progress[unit.id] || 0), 0);
        const corePercent = Math.round((totalProgress / 30) * 100);
        el.starCount.textContent = state.stars;
        el.buildCount.textContent = `${complete}/5`;
        el.materialCount.textContent = totalMaterials;
        el.streakCount.textContent = state.streak;
        el.woodCount.textContent = state.materials.wood;
        el.stoneCount.textContent = state.materials.stone;
        el.leafCount.textContent = state.materials.leaf;
        el.crystalCount.textContent = state.materials.crystal;
        el.coreMeter.style.width = `${corePercent}%`;
        el.coreOrb.classList.toggle("lit", corePercent > 0);
        el.coreTitle.textContent = `世界核心：${coreLabel(corePercent)} ${corePercent}%`;
        el.rescueLog.innerHTML = state.logs.slice(0, 4).map((log) => `<li>${log}</li>`).join("");
        save();
      }

      function startFirstTask() {
        const next = units.find((unit) => (state.progress[unit.id] || 0) < unit.questions.length);
        if (next) startUnit(next.id);
        else finish();
      }

      function startUnit(id) {
        state.unit = units.find((unit) => unit.id === id);
        state.index = Math.min(state.progress[id] || 0, state.unit.questions.length - 1);
        renderTask();
        show("task");
      }

      function renderTask() {
        const unit = state.unit;
        const q = unit.questions[state.index];
        state.answered = false;
        el.unitTopic.textContent = unit.topic;
        el.unitTitle.textContent = unit.title;
        el.progressText.textContent = `${state.index + 1}/${unit.questions.length}`;
        el.progressBar.style.width = `${(state.index / unit.questions.length) * 100}%`;
        el.mission.innerHTML = visual(q.visual);
        el.question.textContent = q.text;
        el.steps.innerHTML = q.steps.map((step, index) => `<div class="step"><strong>第 ${index + 1} 步</strong>${step}</div>`).join("");
        el.answers.innerHTML = "";
        shuffle(q.answers).forEach((answer) => {
          const button = document.createElement("button");
          button.className = "answer";
          button.type = "button";
          button.textContent = answer;
          button.addEventListener("click", () => choose(button, answer));
          el.answers.appendChild(button);
        });
        el.feedback.className = "feedback";
        el.feedback.textContent = unit.intro;
        el.nextBtn.hidden = true;
      }

      function choose(button, answer) {
        if (state.answered) return;
        const q = state.unit.questions[state.index];
        const correct = answer === q.correct;
        button.classList.add(correct ? "good" : "bad");
        if (correct) {
          state.answered = true;
          state.streak += 1;
          state.bestStreak = Math.max(state.bestStreak, state.streak);
          const bonus = state.streak > 0 && state.streak % 3 === 0;
          state.stars += bonus ? 2 : 1;
          state.materials[state.unit.material] += 1;
          state.progress[state.unit.id] = Math.max(state.progress[state.unit.id] || 0, state.index + 1);
          el.feedback.className = "feedback good";
          el.feedback.textContent = bonus
            ? `連擊 ${state.streak}！取得 1 個${materialName(state.unit.material)}和 2 顆能量星，世界核心閃了一下。`
            : `答對了，取得 1 個${materialName(state.unit.material)}，救援進度增加。`;
          addLog(bonus ? `連擊 ${state.streak} 達成，${state.unit.title}送出額外能量星。` : `${state.unit.title}亮起一格，取得${materialName(state.unit.material)}。`);
          el.nextBtn.hidden = false;
          [...el.answers.children].forEach((child) => {
            child.disabled = true;
            if (child.textContent === q.correct) child.classList.add("good");
          });
          drawMap();
        } else {
          state.streak = 0;
          el.feedback.className = "feedback try";
          el.feedback.textContent = `提示方塊：${q.hint}`;
          state.mistakes.push({ unitId: state.unit.id, index: state.index });
          addLog(`${state.unit.title}出現提示方塊，換個方法再試一次。`);
          button.disabled = true;
        }
        renderHud();
      }

      function showHint() {
        const q = state.unit.questions[state.index];
        el.feedback.className = "feedback try";
        el.feedback.textContent = `提示方塊：${q.hint}`;
      }

      function nextTask() {
        if (state.index < state.unit.questions.length - 1) {
          state.index += 1;
          renderTask();
          return;
        }
        if (units.every((unit) => (state.progress[unit.id] || 0) >= unit.questions.length)) finish();
        else show("intro");
      }

      function finish() {
        const mistakes = new Set(state.mistakes.map((item) => `${item.unitId}-${item.index}`)).size;
        el.doneText.textContent = `你收集了 ${Object.values(state.materials).reduce((sum, value) => sum + value, 0)} 個材料、拿到 ${state.stars} 顆能量星，最高連擊 ${state.bestStreak}，點亮 5 個救援點。錯題本裡有 ${mistakes} 題可以再練。`;
        show("done");
      }

      function reviewMistake() {
        const first = state.mistakes[0];
        if (!first) {
          el.doneText.textContent = "目前沒有錯題。可以重新挑戰，試著一次修好整座島。";
          return;
        }
        state.unit = units.find((unit) => unit.id === first.unitId);
        state.index = first.index;
        renderTask();
        show("task");
      }

      function resetGame() {
        state.unit = null;
        state.index = 0;
        state.answered = false;
        state.stars = 0;
        state.streak = 0;
        state.bestStreak = 0;
        state.progress = {};
        state.materials = { wood: 0, stone: 0, leaf: 0, crystal: 0 };
        state.mistakes = [];
        state.logs = ["世界核心正在等待第一道能量。"];
        localStorage.removeItem("saveBlockWorldGame");
        drawMap();
        renderHud();
        show("intro");
      }

      function speakQuestion() {
        if (!("speechSynthesis" in window)) {
          el.feedback.className = "feedback try";
          el.feedback.textContent = "這台裝置目前不支援朗讀。";
          return;
        }
        window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance(el.question.textContent);
        speech.lang = "zh-TW";
        speech.rate = 0.88;
        window.speechSynthesis.speak(speech);
      }

      function materialName(type) {
        return { wood: "木塊", stone: "石塊", leaf: "葉塊", crystal: "晶塊" }[type];
      }

      function coreLabel(percent) {
        if (percent >= 100) return "完全點亮";
        if (percent >= 70) return "強光啟動";
        if (percent >= 40) return "穩定發光";
        if (percent > 0) return "微光恢復";
        return "沉睡中";
      }

      function addLog(message) {
        state.logs = [message, ...state.logs.filter((item) => item !== message)].slice(0, 6);
      }

      function visual(code) {
        const [type, value] = code.split(":");
        if (type === "wood" || type === "stone" || type === "leaf" || type === "crystal") {
          return blockGrid(Number(value), type);
        }
        if (type === "ruler") {
          return `<div class="mission-grid">${Array.from({ length: Number(value) }, (_, i) => `<span class="mini-block" style="background:#f0c65f;color:#59401f">${i + 1}m</span>`).join("")}</div>`;
        }
        if (type === "shape") {
          const labels = {
            roll: ["球", "盒", "柱", "方"],
            cube: ["方", "方", "方", "方"],
            solid: ["長", "方", "球", "柱"],
            sort: ["食", "文", "筆", "本"],
            box: ["鞋", "盒", "球", "幣"]
          }[value];
          return `<div class="mission-grid">${labels.map((label, i) => `<span class="mini-block" style="background:${["#4a9aa0", "#557fd0", "#c4834e", "#cf6753"][i % 4]}">${label}</span>`).join("")}</div>`;
        }
        if (type === "share") {
          return blockGrid(Math.min(Number(value), 18), "wood");
        }
        if (type === "fraction") {
          const [top, bottom] = value.split("/").map(Number);
          return `<div class="mission-grid">${Array.from({ length: bottom }, (_, i) => `<span class="mini-block ${i < top ? "" : "dim"}" style="background:#557fd0">${i < top ? "亮" : ""}</span>`).join("")}</div>`;
        }
        return "";
      }

      function blockGrid(count, type) {
        const color = { wood: "#b8834e", stone: "#778795", leaf: "#3f8f5c", crystal: "#5f85d7" }[type];
        return `<div class="mission-grid">${Array.from({ length: count }, () => `<span class="mini-block" style="background:${color}"></span>`).join("")}</div>`;
      }

      function shuffle(items) {
        return items
          .map((value) => ({ value, sort: Math.random() }))
          .sort((a, b) => a.sort - b.sort)
          .map((item) => item.value);
      }

      function save() {
        localStorage.setItem("saveBlockWorldGame", JSON.stringify({
          stars: state.stars,
          streak: state.streak,
          bestStreak: state.bestStreak,
          progress: state.progress,
          materials: state.materials,
          mistakes: state.mistakes,
          logs: state.logs
        }));
      }

      function load() {
        try {
          const saved = JSON.parse(localStorage.getItem("saveBlockWorldGame"));
          if (!saved) return;
          state.stars = saved.stars || 0;
          state.streak = saved.streak || 0;
          state.bestStreak = saved.bestStreak || 0;
          state.progress = saved.progress || {};
          state.materials = saved.materials || { wood: 0, stone: 0, leaf: 0, crystal: 0 };
          state.mistakes = saved.mistakes || [];
          state.logs = saved.logs || ["世界核心正在等待第一道能量。"];
        } catch {
          localStorage.removeItem("saveBlockWorldGame");
        }
      }
    </script>
  </body>
</html>
